name: AUR

# Refresh the AUR PKGBUILDs and push them, after a GitHub release is published
# (so the .deb / CLI binary download URLs resolve). Invoked two ways:
#   - workflow_call: release.yml calls this once it has published the release.
#   - workflow_dispatch: run by hand for any tag (e.g. to (re)publish v0.4.0).
# Needs one repo secret: AUR_SSH_PRIVATE_KEY (private key registered on the AUR
# account). See packaging/aur/README.md.

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.4.0)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.4.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync:
    name: Refresh PKGBUILD mirror
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      # nodejs is needed for the JS actions (checkout) to run inside the
      # container; pacman-contrib provides updpkgsums.
      - name: Install tooling
        run: pacman -Syu --noconfirm --needed git nodejs pacman-contrib

      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Bump pkgver, refresh checksums + .SRCINFO
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          # makepkg / updpkgsums refuse to run as root, so do the work as an
          # unprivileged user. The release assets are public by now, so
          # updpkgsums can fetch them to compute sha256sums.
          useradd -m builder
          chown -R builder:builder .
          git config --global --add safe.directory "$PWD"
          for pkg in vpkmerge-bin vpkmerge-cli-bin; do
            su builder -c "cd 'packaging/aur/$pkg' && \
              sed -i -E 's/^pkgver=.*/pkgver=$ver/' PKGBUILD && \
              sed -i -E 's/^pkgrel=.*/pkgrel=1/' PKGBUILD && \
              updpkgsums && \
              makepkg --printsrcinfo > .SRCINFO"
          done

      - name: Commit refreshed mirror to main
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$PWD"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/*/PKGBUILD packaging/aur/*/.SRCINFO
          if git diff --cached --quiet; then
            echo "AUR mirror already at ${TAG#v}; nothing to commit."
          else
            git commit -m "packaging(aur): bump to ${TAG#v} [skip ci]"
            git push origin HEAD:main
          fi

  publish:
    name: Publish ${{ matrix.pkgname }} to AUR
    needs: sync
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkgname: [vpkmerge-bin, vpkmerge-cli-bin]
    steps:
      - name: Guard on AUR secret
        id: guard
        env:
          KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::AUR_SSH_PRIVATE_KEY is not set; skipping the AUR push for ${{ matrix.pkgname }}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          ref: main

      - name: Deploy to AUR
        if: steps.guard.outputs.skip != 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: packaging/aur/${{ matrix.pkgname }}/PKGBUILD
          commit_username: Slush97
          commit_email: slusheliott@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ inputs.tag }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          # The sync job already refreshed sha256sums; the action regenerates
          # .SRCINFO from the PKGBUILD before pushing.
          updpkgsums: false
