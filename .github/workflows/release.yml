name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  draft:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v5

      - name: Render release notes
        id: notes
        run: |
          tag="$GITHUB_REF_NAME"
          ver="${tag#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          {
            echo 'body<<EOF'
            # Per-platform Download table. The markdown template lives in
            # .github/release-notes-download.md with @VER@/@BASE@ placeholders so
            # it stays out of this YAML block scalar (column-0 markdown here would
            # terminate the scalar and break the workflow file). Keep the
            # filenames in lockstep with what tauri-bundler and the cli matrix
            # produce.
            sed -e "s|@VER@|${ver}|g" -e "s|@BASE@|${base}|g" \
              .github/release-notes-download.md
            echo
            echo "## What's new"
            echo
            awk -v tag="$tag" '
              $0 ~ "^## " tag "$" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md
            echo
            echo "Built from \`${GITHUB_SHA}\`."
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft
        id: create
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: vpkmerge ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: false

  cli:
    name: CLI (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  asset: vpkmerge-linux-x86_64,    bin: vpkmerge,     ext: ''     }
          - { os: macos-latest,   target: aarch64-apple-darwin,      asset: vpkmerge-macos-aarch64,   bin: vpkmerge,     ext: ''     }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    asset: vpkmerge-windows-x86_64,  bin: vpkmerge,     ext: '.exe' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: cargo build --release --locked -p vpkmerge-cli --target ${{ matrix.target }}

      - name: stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}${{ matrix.ext }}" \
             "dist/${{ matrix.asset }}${{ matrix.ext }}"

      - name: upload
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/${{ matrix.asset }}${{ matrix.ext }}

  gui:
    name: GUI (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin     }
          - { os: windows-latest, target: x86_64-pc-windows-msvc   }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            gui/src-tauri
            .
          key: gui-${{ matrix.target }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: install frontend
        working-directory: gui
        run: pnpm install --frozen-lockfile

      - name: build + upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: stage portable Windows .exe
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/vpkmerge-gui.exe" \
             "dist/vpkmerge_${ver}_x64_portable.exe"

      - name: upload portable Windows .exe
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/vpkmerge_*_x64_portable.exe

  publish:
    name: Publish release
    needs: [cli, gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Mark release as published
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false

  # Once the release is public (its asset URLs resolve), refresh and push the
  # AUR packages. Calling the reusable workflow directly (rather than letting it
  # listen for `release: published`) sidesteps the limitation that events raised
  # by GITHUB_TOKEN do not trigger other workflows.
  aur:
    name: AUR
    needs: publish
    uses: ./.github/workflows/aur.yml
    secrets: inherit
    with:
      tag: ${{ github.ref_name }}
