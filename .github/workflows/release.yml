name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  draft:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v5

      - name: Render release notes
        id: notes
        run: |
          tag="$GITHUB_REF_NAME"
          ver="${tag#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          {
            echo 'body<<EOF'
            # Per-platform Download table. The markdown template lives in
            # .github/release-notes-download.md with @VER@/@BASE@ placeholders so
            # it stays out of this YAML block scalar (column-0 markdown here would
            # terminate the scalar and break the workflow file). Keep the
            # filenames in lockstep with what tauri-bundler and the cli matrix
            # produce.
            sed -e "s|@VER@|${ver}|g" -e "s|@BASE@|${base}|g" \
              .github/release-notes-download.md
            echo
            echo "## What's new"
            echo
            awk -v tag="$tag" '
              $0 ~ "^## " tag "$" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md
            echo
            echo "Built from \`${GITHUB_SHA}\`."
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft
        id: create
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: vpkmerge ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: false

  cli:
    name: CLI (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  asset: vpkmerge-linux-x86_64,    bin: vpkmerge,     ext: ''     }
          - { os: macos-latest,   target: aarch64-apple-darwin,      asset: vpkmerge-macos-aarch64,   bin: vpkmerge,     ext: ''     }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    asset: vpkmerge-windows-x86_64,  bin: vpkmerge,     ext: '.exe' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: cargo build --release --locked -p vpkmerge-cli --target ${{ matrix.target }}

      - name: stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}${{ matrix.ext }}" \
             "dist/${{ matrix.asset }}${{ matrix.ext }}"

      # Upload via the gh CLI (preinstalled on every runner) rather than
      # softprops/action-gh-release. That action re-runs its create-or-find
      # release logic on every matrix leg, so concurrent jobs spawn duplicate
      # drafts for the same tag and race to dedupe each other; the Windows CLI
      # leg lost that race and died. `gh release upload` only uploads to the
      # draft the `draft` job already created, never creating a release itself.
      - name: upload
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "dist/${{ matrix.asset }}${{ matrix.ext }}" \
            --clobber --repo "${{ github.repository }}"

  publish:
    name: Publish release
    needs: [cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Mark release as published
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false

  # Once the release is public (its asset URLs resolve), refresh and push the
  # AUR packages. Calling the reusable workflow directly (rather than letting it
  # listen for `release: published`) sidesteps the limitation that events raised
  # by GITHUB_TOKEN do not trigger other workflows.
  aur:
    name: AUR
    needs: publish
    uses: ./.github/workflows/aur.yml
    secrets: inherit
    with:
      tag: ${{ github.ref_name }}
