name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  draft:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v5

      - name: Render release notes
        id: notes
        run: |
          tag="$GITHUB_REF_NAME"
          ver="${tag#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          {
            echo 'body<<EOF'

            # Stable Download section. Filenames here mirror what tauri-bundler
            # and the cli matrix produce; if either of those is renamed, update
            # this preamble in lockstep.
            cat <<DL
## Download

Two flavors below: most people want the **desktop app**. Power users / scripters want the **CLI**.

### Desktop app (recommended)

| Your computer | File |
|---|---|
| **Windows** | [\`vpkmerge_${ver}_x64-setup.exe\`](${base}/vpkmerge_${ver}_x64-setup.exe) (installer) or [\`vpkmerge_${ver}_x64_en-US.msi\`](${base}/vpkmerge_${ver}_x64_en-US.msi) |
| **macOS** (Apple Silicon, M1+) | [\`vpkmerge_${ver}_aarch64.dmg\`](${base}/vpkmerge_${ver}_aarch64.dmg) |
| **macOS** (Intel) | Run the Apple Silicon \`.dmg\` under Rosetta 2, or build from source. |
| **Linux** (Debian / Ubuntu) | [\`vpkmerge_${ver}_amd64.deb\`](${base}/vpkmerge_${ver}_amd64.deb) |
| **Linux** (Fedora / RHEL)   | [\`vpkmerge-${ver}-1.x86_64.rpm\`](${base}/vpkmerge-${ver}-1.x86_64.rpm) |
| **Linux** (anything else)   | [\`vpkmerge_${ver}_amd64.AppImage\`](${base}/vpkmerge_${ver}_amd64.AppImage) (no install, \`chmod +x\` and run) |

Install steps:
- **Windows**: double-click the \`.exe\` installer.
- **macOS**: open the \`.dmg\`, drag the app into Applications. First launch: right-click → Open (app is not notarized).
- **Linux .deb**: \`sudo dpkg -i vpkmerge_${ver}_amd64.deb\`
- **Linux .rpm**: \`sudo dnf install ./vpkmerge-${ver}-1.x86_64.rpm\`
- **Linux AppImage**: \`chmod +x vpkmerge_${ver}_amd64.AppImage && ./vpkmerge_${ver}_amd64.AppImage\`

### Command-line tool

| Your computer | File |
|---|---|
| **Linux** (x86_64) | [\`vpkmerge-linux-x86_64\`](${base}/vpkmerge-linux-x86_64) |
| **macOS** (Apple Silicon) | [\`vpkmerge-macos-aarch64\`](${base}/vpkmerge-macos-aarch64) |
| **Windows** (x86_64) | [\`vpkmerge-windows-x86_64.exe\`](${base}/vpkmerge-windows-x86_64.exe) |

On Linux/macOS, \`chmod +x vpkmerge-*\` once and call it from a terminal. On Windows it's already executable.

---

DL
            echo
            echo "## What's new"
            echo
            awk -v tag="$tag" '
              $0 ~ "^## " tag "$" { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md
            echo
            echo "Built from \`${GITHUB_SHA}\`."
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: vpkmerge ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: false

  cli:
    name: CLI (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  asset: vpkmerge-linux-x86_64,    bin: vpkmerge,     ext: ''     }
          - { os: macos-latest,   target: aarch64-apple-darwin,      asset: vpkmerge-macos-aarch64,   bin: vpkmerge,     ext: ''     }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    asset: vpkmerge-windows-x86_64,  bin: vpkmerge,     ext: '.exe' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: build
        run: cargo build --release --locked -p vpkmerge-cli --target ${{ matrix.target }}

      - name: stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}${{ matrix.ext }}" \
             "dist/${{ matrix.asset }}${{ matrix.ext }}"

      - name: upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist/${{ matrix.asset }}${{ matrix.ext }}

  gui:
    name: GUI (${{ matrix.target }})
    needs: draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin     }
          - { os: windows-latest, target: x86_64-pc-windows-msvc   }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            gui/src-tauri
            .
          key: gui-${{ matrix.target }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: install frontend
        working-directory: gui
        run: pnpm install --frozen-lockfile

      - name: build + upload via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  publish:
    name: Publish release
    needs: [cli, gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Mark release as published
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
