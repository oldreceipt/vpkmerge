<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>vpkmerge</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <header>
      <h1>vpkmerge</h1>
      <p class="subtitle">Combine Deadlock mod VPKs to bypass the ~100 mount limit.</p>
    </header>

    <section class="card">
      <div class="row-head">
        <h2>Mods</h2>
        <button id="add-mod" class="btn primary">+ Add VPK</button>
      </div>
      <p class="hint">Drag rows to reorder. Mods lower in the list win on conflict.</p>
      <ul id="mod-list" class="list"></ul>
      <p id="mod-empty" class="muted">No mods added yet.</p>
    </section>

    <section class="card">
      <div class="row-head">
        <h2>Conflicts <span id="conflict-count" class="badge hidden">0</span></h2>
      </div>
      <ul id="conflict-list" class="list conflicts"></ul>
      <p id="conflict-empty" class="muted">No conflicts.</p>
    </section>

    <section class="card">
      <div class="row-head">
        <h2>Output</h2>
      </div>
      <div class="output-row">
        <input id="output-path" type="text" placeholder="Choose output VPK file..." readonly />
        <button id="browse-output" class="btn">Browse</button>
      </div>
    </section>

    <footer class="footer">
      <div id="status" class="status"></div>
      <button id="merge" class="btn primary large" disabled>Merge VPKs</button>
    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
