<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none" stroke="#5e5039" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.28">
  <!-- Pentagram in circle -->
  <g transform="translate(75 85) rotate(-8)">
    <circle r="24"/>
    <path d="M0 -24 L14.1 19.4 L-22.8 -7.4 L22.8 -7.4 L-14.1 19.4 Z"/>
  </g>

  <!-- Crescent moon -->
  <g transform="translate(370 75) rotate(-12)">
    <path d="M4 -14 A 15 15 0 1 0 4 14 A 11 11 0 1 1 4 -14 Z"/>
  </g>

  <!-- Serpent / wave -->
  <g transform="translate(210 90)">
    <path d="M-26 0 q 7 -8 14 0 q 7 8 14 0 q 7 -8 14 0 q 7 8 14 0"/>
    <circle cx="-26" cy="0" r="1.4" fill="#5e5039"/>
  </g>

  <!-- All-seeing eye -->
  <g transform="translate(90 200) rotate(4)">
    <path d="M-20 0 q 20 -10 40 0 q -20 10 -40 0"/>
    <circle cx="0" cy="0" r="4"/>
    <circle cx="0" cy="0" r="1.6" fill="#5e5039"/>
  </g>

  <!-- Hexagram (Solomon's seal) -->
  <g transform="translate(260 195)">
    <path d="M0 -22 L19 11 L-19 11 Z"/>
    <path d="M0 22 L19 -11 L-19 -11 Z"/>
  </g>

  <!-- Crystal cluster -->
  <g transform="translate(410 200) rotate(-6)">
    <path d="M-10 -5 L-4 -16 L2 -3 L-4 8 Z"/>
    <path d="M0 0 L6 -13 L11 1 L5 14 Z"/>
    <path d="M9 7 L14 -2 L20 8 L14 16 Z"/>
  </g>

  <!-- Triangle with inner eye -->
  <g transform="translate(60 320)">
    <path d="M0 -28 L24 14 L-24 14 Z"/>
    <path d="M-12 0 q 12 -4 24 0 q -12 4 -24 0"/>
    <circle cx="0" cy="0" r="2" fill="#5e5039"/>
  </g>

  <!-- Sun with rays -->
  <g transform="translate(200 320)">
    <circle r="5"/>
    <path d="M10 0 L16 0 M-10 0 L-16 0 M0 10 L0 16 M0 -10 L0 -16"/>
    <path d="M7 -7 L11.3 -11.3 M-7 -7 L-11.3 -11.3 M7 7 L11.3 11.3 M-7 7 L-11.3 11.3"/>
  </g>

  <!-- Alchemy circle (sun symbol) -->
  <g transform="translate(370 312)">
    <circle r="11"/>
    <circle cx="0" cy="0" r="1.8" fill="#5e5039"/>
  </g>

  <!-- Hourglass -->
  <g transform="translate(105 432) rotate(-3)">
    <path d="M-10 -14 L10 -14 L0 0 Z"/>
    <path d="M0 0 L10 14 L-10 14 Z"/>
    <path d="M-13 -14 L13 -14 M-13 14 L13 14"/>
  </g>

  <!-- Small pentagram -->
  <g transform="translate(260 420) scale(0.6) rotate(10)">
    <path d="M0 -24 L14.1 19.4 L-22.8 -7.4 L22.8 -7.4 L-14.1 19.4 Z"/>
  </g>

  <!-- Inverted triangle (alchemy: water) -->
  <g transform="translate(400 422)">
    <path d="M0 14 L-17 -10 L17 -10 Z"/>
    <path d="M-12 -1 L12 -1"/>
  </g>

  <!-- Scattered star-dots -->
  <circle cx="155" cy="48" r="1.6" fill="#5e5039"/>
  <circle cx="300" cy="252" r="1.6" fill="#5e5039"/>
  <circle cx="435" cy="362" r="1.6" fill="#5e5039"/>
  <circle cx="35" cy="378" r="1.6" fill="#5e5039"/>
  <circle cx="320" cy="135" r="1.6" fill="#5e5039"/>
  <circle cx="455" cy="135" r="1.6" fill="#5e5039"/>
  <circle cx="148" cy="252" r="1.6" fill="#5e5039"/>
  <circle cx="180" cy="385" r="1.6" fill="#5e5039"/>
  <circle cx="345" cy="376" r="1.6" fill="#5e5039"/>
  <circle cx="220" cy="240" r="1.6" fill="#5e5039"/>
</svg>
