<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none" stroke="#bba87f" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.18">

  <!-- Saturn-like ringed planet -->
  <g transform="translate(75 85) rotate(-14)">
    <circle r="16"/>
    <ellipse rx="28" ry="6"/>
    <path d="M-26 -2 q 26 8 52 0"/>
    <circle cx="-5" cy="-4" r="1" fill="#bba87f"/>
    <circle cx="5" cy="2" r="0.9" fill="#bba87f"/>
  </g>

  <!-- Constellation (Orion-like) -->
  <g transform="translate(220 80)">
    <path d="M-30 -20 L-10 -8 L10 -16 L24 6 L8 18 L-18 14 L-30 -20"/>
    <path d="M-10 -8 L-18 14 M10 -16 L8 18"/>
    <circle cx="-30" cy="-20" r="2" fill="#bba87f"/>
    <circle cx="-10" cy="-8" r="2.4" fill="#bba87f"/>
    <circle cx="10" cy="-16" r="2" fill="#bba87f"/>
    <circle cx="24" cy="6" r="2.6" fill="#bba87f"/>
    <circle cx="8" cy="18" r="2" fill="#bba87f"/>
    <circle cx="-18" cy="14" r="2.2" fill="#bba87f"/>
  </g>

  <!-- Comet with tail -->
  <g transform="translate(380 75) rotate(20)">
    <circle r="5"/>
    <circle r="1.6" fill="#bba87f"/>
    <path d="M5 0 q 20 -2 40 8 M5 -2 q 22 -8 42 -4 M5 2 q 18 6 36 14"/>
  </g>

  <!-- Crescent moon with stars -->
  <g transform="translate(85 210) rotate(-22)">
    <path d="M0 -18 A 18 18 0 1 0 0 18 A 14 14 0 1 1 0 -18 Z"/>
    <circle cx="-26" cy="-10" r="1.2" fill="#bba87f"/>
    <circle cx="-30" cy="6" r="1" fill="#bba87f"/>
  </g>

  <!-- Eclipse (moon over sun) -->
  <g transform="translate(240 215)">
    <circle r="20"/>
    <path d="M-24 0 L-32 0 M24 0 L32 0 M0 -24 L0 -32 M0 24 L0 32"/>
    <path d="M-17 -17 L-23 -23 M17 -17 L23 -23 M-17 17 L-23 23 M17 17 L23 23"/>
    <circle r="14" fill="#bba87f" opacity="0.45"/>
  </g>

  <!-- Galaxy spiral -->
  <g transform="translate(395 215) rotate(0)">
    <path d="M0 0 q 4 -10 14 -10 q 12 0 14 12 q 0 14 -16 16 q -18 0 -20 -18 q 0 -22 24 -24 q 26 0 28 26"/>
    <circle r="1.4" fill="#bba87f"/>
  </g>

  <!-- Sun with face -->
  <g transform="translate(80 335)">
    <circle r="14"/>
    <circle cx="-4" cy="-2" r="0.9" fill="#bba87f"/>
    <circle cx="4" cy="-2" r="0.9" fill="#bba87f"/>
    <path d="M-4 5 q 4 3 8 0"/>
    <path d="M20 0 L26 0 M-20 0 L-26 0 M0 20 L0 26 M0 -20 L0 -26"/>
    <path d="M14 -14 L19 -19 M-14 -14 L-19 -19 M14 14 L19 19 M-14 14 L-19 19"/>
  </g>

  <!-- Star cluster (Pleiades) -->
  <g transform="translate(225 335)">
    <circle cx="-12" cy="-6" r="1.8" fill="#bba87f"/>
    <circle cx="2" cy="-12" r="2.2" fill="#bba87f"/>
    <circle cx="14" cy="-4" r="1.6" fill="#bba87f"/>
    <circle cx="6" cy="6" r="2" fill="#bba87f"/>
    <circle cx="-8" cy="10" r="1.6" fill="#bba87f"/>
    <circle cx="18" cy="10" r="1.4" fill="#bba87f"/>
    <circle cx="-4" cy="-2" r="1.2" fill="#bba87f"/>
    <path d="M-12 -6 q 7 -2 14 -6 q 5 4 12 8 q -3 6 -8 6 q -8 4 -16 -4 q -2 -2 -2 -4" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Shooting star -->
  <g transform="translate(395 340) rotate(-30)">
    <path d="M-22 0 L0 0"/>
    <path d="M-14 0 L-14 -4 M-8 0 L-8 -5 M-2 0 L-2 -6"/>
    <path d="M0 -5 L0 5 M-5 0 L5 0 M-3.5 -3.5 L3.5 3.5 M-3.5 3.5 L3.5 -3.5"/>
  </g>

  <!-- Telescope -->
  <g transform="translate(95 430) rotate(-30)">
    <path d="M-14 -4 L14 -4 L18 -2 L14 0 L-14 0 Z"/>
    <path d="M-14 0 L-18 6 M-14 -4 L-18 -10"/>
    <path d="M4 4 L8 14 M-4 4 L-8 14"/>
  </g>

  <!-- Big six-point star -->
  <g transform="translate(245 425)">
    <path d="M0 -12 L3 -3 L12 0 L3 3 L0 12 L-3 3 L-12 0 L-3 -3 Z"/>
    <circle r="1.2" fill="#bba87f"/>
  </g>

  <!-- Constellation Cassiopeia W -->
  <g transform="translate(395 425) rotate(-6)">
    <path d="M-20 -4 L-10 8 L0 -2 L10 8 L20 -4"/>
    <circle cx="-20" cy="-4" r="1.8" fill="#bba87f"/>
    <circle cx="-10" cy="8" r="1.8" fill="#bba87f"/>
    <circle cx="0" cy="-2" r="1.8" fill="#bba87f"/>
    <circle cx="10" cy="8" r="1.8" fill="#bba87f"/>
    <circle cx="20" cy="-4" r="1.8" fill="#bba87f"/>
  </g>

  <!-- Scattered stars -->
  <circle cx="160" cy="40" r="1.6" fill="#bba87f"/>
  <circle cx="320" cy="155" r="1.4" fill="#bba87f"/>
  <circle cx="40" cy="155" r="1.6" fill="#bba87f"/>
  <circle cx="170" cy="280" r="1.4" fill="#bba87f"/>
  <circle cx="320" cy="280" r="1.6" fill="#bba87f"/>
  <circle cx="465" cy="120" r="1.4" fill="#bba87f"/>
  <circle cx="150" cy="380" r="1.4" fill="#bba87f"/>
  <circle cx="330" cy="385" r="1.4" fill="#bba87f"/>
  <circle cx="465" cy="280" r="1.4" fill="#bba87f"/>

  <g stroke-width="0.7" opacity="0.85">
    <path d="M125 110 l 0 -4 M125 110 l 0 4 M125 110 l -4 0 M125 110 l 4 0"/>
    <path d="M340 50 l 0 -5 M340 50 l 0 5 M340 50 l -5 0 M340 50 l 5 0"/>
    <path d="M55 270 l 0 -4 M55 270 l 0 4 M55 270 l -4 0 M55 270 l 4 0"/>
    <path d="M310 110 l 0 -4 M310 110 l 0 4 M310 110 l -4 0 M310 110 l 4 0"/>
    <path d="M170 165 l 0 -4 M170 165 l 0 4 M170 165 l -4 0 M170 165 l 4 0"/>
  </g>
</svg>
