<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none" stroke="#5e5039" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.28">

  <!-- Fern frond -->
  <g transform="translate(85 90) rotate(-18)">
    <path d="M0 22 q 0 -22 0 -44"/>
    <path d="M0 18 q -8 -2 -12 -8 M0 12 q -10 -2 -14 -10 M0 6 q -10 -2 -14 -12 M0 -2 q -8 -2 -12 -12 M0 -10 q -7 -2 -10 -10 M0 -18 q -5 -1 -7 -8"/>
    <path d="M0 18 q 8 -2 12 -8 M0 12 q 10 -2 14 -10 M0 6 q 10 -2 14 -12 M0 -2 q 8 -2 12 -12 M0 -10 q 7 -2 10 -10 M0 -18 q 5 -1 7 -8"/>
  </g>

  <!-- Curling vine with leaves -->
  <g transform="translate(220 90)">
    <path d="M-32 14 q 10 -16 0 -28 q -10 -14 8 -22 q 14 -2 18 12 q 2 12 -8 16"/>
    <path d="M-30 8 q -6 -2 -8 -6 q 4 -2 8 0 Z"/>
    <path d="M-22 -10 q -6 0 -10 4 q 0 -6 4 -10 q 4 -2 6 6 Z"/>
    <path d="M-8 -22 q -2 -6 -8 -6 q 0 6 4 8 q 4 1 4 -2 Z"/>
    <path d="M8 -10 q 6 -2 6 -8 q -6 -1 -8 4 q -1 4 2 4 Z"/>
  </g>

  <!-- Mushroom (cap + gills) -->
  <g transform="translate(380 85)">
    <path d="M-18 0 q 0 -18 18 -18 q 18 0 18 18 Z"/>
    <path d="M-14 0 L-14 4 q 0 8 14 8 q 14 0 14 -8 L14 0"/>
    <path d="M-10 -10 q 0 -6 4 -8 M-2 -16 q 0 -2 4 -2 M8 -14 q 0 -4 6 -4"/>
    <circle cx="-6" cy="2" r="1.2" fill="#5e5039"/>
    <circle cx="2" cy="3" r="1" fill="#5e5039"/>
  </g>

  <!-- Flower bloom -->
  <g transform="translate(85 215)">
    <g>
      <path d="M0 -6 q -8 -3 -8 -12 q 4 -6 8 -2 q 4 -4 8 2 q 0 9 -8 12 Z"/>
      <g transform="rotate(72)">
        <path d="M0 -6 q -8 -3 -8 -12 q 4 -6 8 -2 q 4 -4 8 2 q 0 9 -8 12 Z"/>
      </g>
      <g transform="rotate(144)">
        <path d="M0 -6 q -8 -3 -8 -12 q 4 -6 8 -2 q 4 -4 8 2 q 0 9 -8 12 Z"/>
      </g>
      <g transform="rotate(216)">
        <path d="M0 -6 q -8 -3 -8 -12 q 4 -6 8 -2 q 4 -4 8 2 q 0 9 -8 12 Z"/>
      </g>
      <g transform="rotate(288)">
        <path d="M0 -6 q -8 -3 -8 -12 q 4 -6 8 -2 q 4 -4 8 2 q 0 9 -8 12 Z"/>
      </g>
    </g>
    <circle r="3"/>
    <circle r="1.2" fill="#5e5039"/>
  </g>

  <!-- Berry sprig (three berries) -->
  <g transform="translate(220 215) rotate(8)">
    <path d="M0 16 q 4 -8 -2 -18"/>
    <circle cx="-4" cy="0" r="4"/>
    <circle cx="4" cy="-4" r="4"/>
    <circle cx="0" cy="-12" r="4"/>
    <path d="M-2 14 q -6 -4 -10 -2 M2 8 q 6 -2 10 0"/>
  </g>

  <!-- Dandelion seed head -->
  <g transform="translate(390 215)">
    <circle r="3"/>
    <g stroke-width="0.7">
      <path d="M0 -4 L0 -18 M3 -3 L13 -13 M4 0 L18 0 M3 3 L13 13 M0 4 L0 18 M-3 3 L-13 13 M-4 0 L-18 0 M-3 -3 L-13 -13"/>
      <path d="M2 -4 L8 -16 M-2 -4 L-8 -16 M4 -2 L16 -8 M4 2 L16 8 M2 4 L8 16 M-2 4 L-8 16 M-4 -2 L-16 -8 M-4 2 L-16 8"/>
      <circle cx="0" cy="-18" r="0.8" fill="#5e5039"/>
      <circle cx="13" cy="-13" r="0.8" fill="#5e5039"/>
      <circle cx="18" cy="0" r="0.8" fill="#5e5039"/>
      <circle cx="13" cy="13" r="0.8" fill="#5e5039"/>
      <circle cx="0" cy="18" r="0.8" fill="#5e5039"/>
      <circle cx="-13" cy="13" r="0.8" fill="#5e5039"/>
      <circle cx="-18" cy="0" r="0.8" fill="#5e5039"/>
      <circle cx="-13" cy="-13" r="0.8" fill="#5e5039"/>
    </g>
  </g>

  <!-- Acorn -->
  <g transform="translate(85 335)">
    <path d="M-8 -4 q 0 14 8 18 q 8 -4 8 -18 Z"/>
    <path d="M-9 -4 q 0 -7 9 -7 q 9 0 9 7 Z"/>
    <path d="M0 -11 L0 -15"/>
    <path d="M-6 -6 L6 -6 M-6 -3 L6 -3"/>
  </g>

  <!-- Sprig of leaves (3-leaf branch) -->
  <g transform="translate(220 335) rotate(-10)">
    <path d="M-22 0 L22 0"/>
    <path d="M-12 0 q -4 -10 4 -10 q 6 0 6 6 q 0 4 -10 4 Z"/>
    <path d="M2 0 q 4 -8 10 -6 q 4 4 0 8 q -4 2 -10 -2 Z"/>
    <path d="M14 0 q 2 8 -4 10 q -4 0 -4 -4 q 0 -4 8 -6 Z"/>
  </g>

  <!-- Mushroom cluster (3 small) -->
  <g transform="translate(390 335)">
    <g transform="translate(-10 4)">
      <path d="M-7 0 q 0 -8 7 -8 q 7 0 7 8 Z"/>
      <path d="M-3 0 L-3 6 q 0 3 3 3 q 3 0 3 -3 L3 0"/>
    </g>
    <g transform="translate(8 -2)">
      <path d="M-9 0 q 0 -10 9 -10 q 9 0 9 10 Z"/>
      <path d="M-4 0 L-4 8 q 0 4 4 4 q 4 0 4 -4 L4 0"/>
      <circle cx="-2" cy="-3" r="0.8" fill="#5e5039"/>
      <circle cx="3" cy="-5" r="0.8" fill="#5e5039"/>
    </g>
  </g>

  <!-- Spiraling tendril -->
  <g transform="translate(85 430) rotate(-6)">
    <path d="M-18 0 q 12 -8 18 0 q 4 8 -4 10 q -6 0 -6 -6 q 2 -4 6 -2"/>
    <path d="M-18 0 q -2 -8 -8 -10 q -8 0 -8 8 q 2 8 12 4"/>
  </g>

  <!-- Flower bud (closed) -->
  <g transform="translate(220 430)">
    <path d="M0 8 q 0 -22 0 -28"/>
    <path d="M-6 -10 q 6 -12 12 -8 q 4 6 -6 14 q -4 4 -6 -6 Z"/>
    <path d="M-6 0 q -6 -4 -10 0 q 0 6 8 6 Z"/>
    <path d="M6 4 q 8 -2 10 4 q -2 4 -8 0 Z"/>
  </g>

  <!-- Pinecone -->
  <g transform="translate(395 425)">
    <ellipse rx="9" ry="14"/>
    <path d="M-6 -10 q 6 4 12 0 M-7 -4 q 7 4 14 0 M-7 2 q 7 4 14 0 M-6 8 q 6 4 12 0"/>
    <path d="M0 -14 L0 -18 M-2 -16 L2 -16"/>
  </g>

  <!-- Scattered seeds/dots -->
  <circle cx="155" cy="40" r="1.4" fill="#5e5039"/>
  <circle cx="305" cy="140" r="1.4" fill="#5e5039"/>
  <circle cx="445" cy="155" r="1.4" fill="#5e5039"/>
  <circle cx="35" cy="160" r="1.4" fill="#5e5039"/>
  <circle cx="155" cy="280" r="1.4" fill="#5e5039"/>
  <circle cx="320" cy="270" r="1.4" fill="#5e5039"/>
  <circle cx="40" cy="280" r="1.4" fill="#5e5039"/>
  <circle cx="155" cy="385" r="1.4" fill="#5e5039"/>
  <circle cx="320" cy="380" r="1.4" fill="#5e5039"/>
  <circle cx="455" cy="80" r="1.4" fill="#5e5039"/>
</svg>
