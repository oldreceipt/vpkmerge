  <g transform="translate(385 430)">
    <path d="M-16 4 q 16 8 32 0 L12 4 Z"/>
    <path d="M-2 4 L-2 -16 L12 -2 L-2 -2"/>
    <path d="M-14 -10 L-14 4 L-8 -8 L-14 -10"/>
