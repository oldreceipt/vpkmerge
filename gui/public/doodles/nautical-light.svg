<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" fill="none" stroke="#5e5039" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.28">

  <!-- Compass rose -->
  <g transform="translate(85 90)">
    <circle r="28"/>
    <circle r="22"/>
    <path d="M0 -28 L4 0 L0 28 L-4 0 Z"/>
    <path d="M-28 0 L0 -4 L28 0 L0 4 Z"/>
    <path d="M-20 -20 L0 -2 L20 -20 L2 0 L20 20 L0 2 L-20 20 L-2 0 Z"/>
    <circle r="2"/>
    <path d="M0 -32 L-3 -36 L3 -36 Z"/>
  </g>

  <!-- Anchor -->
  <g transform="translate(220 95)">
    <circle cy="-18" r="4"/>
    <path d="M0 -14 L0 14"/>
    <path d="M-8 -8 L8 -8"/>
    <path d="M-16 8 q 0 12 16 12 q 16 0 16 -12"/>
    <path d="M-16 8 L-22 4 M-16 8 L-20 14"/>
    <path d="M16 8 L22 4 M16 8 L20 14"/>
  </g>

  <!-- Wave -->
  <g transform="translate(370 90)">
    <path d="M-30 0 q 7 -10 14 0 q 7 10 14 0 q 7 -10 14 0 q 7 10 14 0"/>
    <path d="M-26 -10 q 6 -8 12 -2"/>
    <path d="M-12 -16 q 4 -4 10 -2"/>
    <path d="M-26 8 q 6 6 10 2 M-6 8 q 6 6 10 2 M14 8 q 6 6 10 2"/>
  </g>

  <!-- Sextant -->
  <g transform="translate(85 215)">
    <path d="M-20 14 L20 14 L0 -22 Z"/>
    <path d="M-16 14 q 0 -20 16 -28 q 16 8 16 28"/>
    <path d="M-12 14 L-4 -8"/>
    <path d="M-14 14 L-14 18 M-8 14 L-8 18 M-2 14 L-2 18 M4 14 L4 18 M10 14 L10 18 M14 14 L14 18"/>
