    <circle r="14"/>
    <circle r="4"/>
    <path d="M0 -22 L0 -14 M0 22 L0 14 M-22 0 L-14 0 M22 0 L14 0"/>
    <path d="M-15.5 -15.5 L-9.9 -9.9 M15.5 -15.5 L9.9 -9.9 M-15.5 15.5 L-9.9 9.9 M15.5 15.5 L9.9 9.9"/>
    <path d="M0 -22 L-3 -26 L3 -26 Z M0 22 L-3 26 L3 26 Z"/>
    <path d="M-22 0 L-26 -3 L-26 3 Z M22 0 L26 -3 L26 3 Z"/>
