  <!-- Lighthouse -->
  <g transform="translate(220 335)">
    <path d="M-8 14 L-6 -8 L6 -8 L8 14 Z"/>
    <path d="M-10 -8 L10 -8"/>
    <path d="M-7 -8 L-7 -14 L7 -14 L7 -8"/>
    <path d="M-5 -14 L-5 -20 L5 -20 L5 -14"/>
