    <path d="M-12 -8 q 6 -2 12 -2 q 6 0 12 2 M-12 16 q 6 2 12 2 q 6 0 12 -2"/>
    <path d="M-12 -8 L-18 -12 M-12 16 L-18 20 M12 -8 L18 -12 M12 16 L18 20"/>
  </g>

  <!-- Ship wheel -->
  <g transform="translate(85 335)">
