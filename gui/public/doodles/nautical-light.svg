  <!-- Scattered nav dots -->
  <circle cx="155" cy="48" r="1.4" fill="#5e5039"/>
  <circle cx="305" cy="155" r="1.4" fill="#5e5039"/>
  <circle cx="40" cy="155" r="1.4" fill="#5e5039"/>
  <circle cx="155" cy="270" r="1.4" fill="#5e5039"/>
  <circle cx="305" cy="270" r="1.4" fill="#5e5039"/>
  <circle cx="155" cy="385" r="1.4" fill="#5e5039"/>
  <circle cx="305" cy="385" r="1.4" fill="#5e5039"/>
  <circle cx="455" cy="155" r="1.4" fill="#5e5039"/>

  <!-- Wind direction arrows -->
  <g stroke-width="0.7" opacity="0.8">
    <path d="M345 50 q 14 -4 28 0 M373 50 l -4 -3 M373 50 l -4 3"/>
    <path d="M130 130 q 14 -4 28 0 M158 130 l -4 -3 M158 130 l -4 3"/>
    <path d="M40 380 q 14 -4 28 0 M68 380 l -4 -3 M68 380 l -4 3"/>
  </g>
