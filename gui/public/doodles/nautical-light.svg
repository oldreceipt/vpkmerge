  <g transform="translate(220 430)">
    <path d="M0 16 L0 -12"/>
    <path d="M-10 -8 L-10 -16 L-6 -12 L-6 -18"/>
    <path d="M10 -8 L10 -16 L6 -12 L6 -18"/>
    <path d="M-6 -12 L0 -16 L6 -12 L0 -22 Z"/>
    <path d="M-4 16 L4 16"/>
