  </g>

  <!-- Sea serpent / dragon -->
  <g transform="translate(220 215)">
    <path d="M-30 0 q 6 -16 12 0 q 6 16 12 0 q 6 -16 12 0 q 6 16 12 0"/>
    <path d="M30 -2 q 4 -2 6 -8 q -2 -4 -6 -2"/>
